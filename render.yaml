databases:
  - name: careerdev-db
    plan: free
    databaseName: careerdev
    user: careerdev

services:
  - type: web
    name: careerdev-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careerdev-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://your-app.vercel.app"
      - key: NEWSLETTER_FROM
        value: "CrewTransition <newsletter@crewtransition.com>"
      - key: NEWSLETTER_REPLY_TO
        value: "crewtransition.app@gmail.com"
    healthCheckPath: /health
