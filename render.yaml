databases:
  - name: careerdev-db
    plan: free
    databaseName: careerdev
    user: careerdev

services:
  - type: web
    name: careerdev-api
    runtime: python
    plan: free
    rootDir: backend
    pythonVersion: "3.11.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careerdev-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://your-app.vercel.app"
    healthCheckPath: /health
